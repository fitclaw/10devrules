name: Docs Check

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          required_files=(
            README.md
            README.zh-CN.md
            SKILL.md
            LICENSE
            CONTRIBUTING.md
            SECURITY.md
            CODE_OF_CONDUCT.md
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Verify README titles
        run: |
          grep -q "^# Ten Development Rules" README.md
          grep -q "^# Ten Development Rules" README.zh-CN.md
