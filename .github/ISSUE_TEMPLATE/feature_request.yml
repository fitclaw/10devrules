name: Feature request
description: Suggest an improvement to the skill, docs, or repository experience
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

        Please keep requests general-purpose and avoid posting organization-specific, customer-specific, or otherwise private context.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What problem or friction are you trying to solve?
      placeholder: Describe the gap or pain point
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried or considered already?
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Is this a wording improvement, process improvement, or new supporting asset?
    validations:
      required: false
